name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: vet + test + build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race -count=1 ./...

      - name: build
        run: go build -o /tmp/nucleusmcp-${{ matrix.os }} ./cmd/nucleusmcp

      - name: smoke
        run: |
          /tmp/nucleusmcp-${{ matrix.os }} --version
          /tmp/nucleusmcp-${{ matrix.os }} connectors

  release-snapshot:
    name: goreleaser snapshot
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean

      - uses: actions/upload-artifact@v4
        with:
          name: nucleusmcp-snapshot-binaries
          path: dist/*
          retention-days: 7
