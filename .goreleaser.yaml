version: 2
project_name: nucleus

before:
  hooks:
    - go mod tidy

builds:
  - id: nucleus
    main: ./cmd/nucleus
    binary: nucleus
    env:
      - CGO_ENABLED=0
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: true

# Homebrew tap publishing. Requires `doramirdor/homebrew-tap` to exist
# (it does, empty shell) and the HOMEBREW_TAP_TOKEN secret in this repo
# to carry a PAT with write access to the tap. goreleaser commits a
# Formula/nucleus.rb to the tap on every release tag.
brews:
  - name: nucleus
    repository:
      owner: doramirdor
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/doramirdor/nucleusmcp
    description: "Profile-aware MCP gateway — one connector, many accounts"
    license: MIT
    install: |
      bin.install "nucleus"
    test: |
      system "#{bin}/nucleus", "--version"
